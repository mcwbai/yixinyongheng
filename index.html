<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一心永恒</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #0f0f0f;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, "Microsoft YaHei", sans-serif;
  }

  .lock-screen {
    text-align: center;
    padding: 48px 32px;
    background: #1a1a1a;
    border-radius: 12px;
    border: 1px solid #2a2a2a;
    width: 480px;
    max-width: 90vw;
  }

  .lock-icon {
    font-size: 48px;
    margin-bottom: 20px;
  }

  .lock-screen h2 {
    color: #ccc;
    font-size: 18px;
    font-weight: 400;
    margin-bottom: 24px;
  }

  .pin-container {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 12px;
  }

  .pin-input {
    width: 56px;
    height: 60px;
    padding: 0;
    border: 1px solid #333;
    border-radius: 8px;
    background: #0f0f0f;
    color: #fff;
    font-size: 28px;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
  }

  .pin-input:focus {
    border-color: #555;
  }

  .lock-screen button {
    width: 100%;
    margin-top: 12px;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #333;
    color: #ccc;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .lock-screen button:hover {
    background: #444;
  }

  .error-msg {
    color: #e05555;
    font-size: 13px;
    margin-top: 12px;
    display: none;
  }

  .hint-toggle {
    margin-top: 20px;
    color: #666;
    font-size: 13px;
    cursor: pointer;
    user-select: none;
  }

  .hint-toggle:hover {
    color: #999;
  }

  .hint-content {
    display: none;
    margin-top: 14px;
    color: #888;
    font-size: 14px;
    line-height: 1.8;
    font-family: "Courier New", monospace;
  }

  .hint-content.show {
    display: block;
  }

  .content-screen {
    display: none;
    text-align: center;
    padding: 24px;
    color: #ccc;
    font-size: 18px;
  }

  .content-screen img {
    max-width: 90vw;
    max-height: 90vh;
    border-radius: 8px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  }
</style>
</head>
<body>

<div class="lock-screen" id="lockScreen">
  <div class="lock-icon">❓</div>
  <h2>请输入密码</h2>
  <div class="pin-container">
    <input type="password" class="pin-input" id="pin1" maxlength="1" inputmode="numeric" autofocus>
    <input type="password" class="pin-input" id="pin2" maxlength="1" inputmode="numeric">
    <input type="password" class="pin-input" id="pin3" maxlength="1" inputmode="numeric">
    <input type="password" class="pin-input" id="pin4" maxlength="1" inputmode="numeric">
  </div>
  <button onclick="checkPassword()">确认</button>
  <div class="error-msg" id="errorMsg">密码错误，请重试</div>
  <div class="hint-toggle" onclick="document.getElementById('hintBox').classList.add('show');this.style.display='none'">💡 提示</div>
  <div class="hint-content" id="hintBox">
    <div>12345678 = 4634</div>
    <div>1234</div>
    <div>1234</div>
    <div>2468</div>
  </div>
</div>

<div class="content-screen" id="contentScreen">
  <img src="daheita.jpg" alt="daheita">
</div>

<script>
  const PASSWORD_HASH = '7ba6de8b74a1751302131909116affb1ef205843f654190346be26ee8a9177da';

  async function sha256(text) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  function getPassword() {
    return ['pin1','pin2','pin3','pin4'].map(id => document.getElementById(id).value).join('');
  }

  async function checkPassword() {
    const input = getPassword();
    if (input.length < 4) return;
    const hash = await sha256(input);
    if (hash === PASSWORD_HASH) {
      document.getElementById('lockScreen').style.display = 'none';
      document.getElementById('contentScreen').style.display = 'block';
    } else {
      document.getElementById('errorMsg').style.display = 'block';
      ['pin1','pin2','pin3','pin4'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('pin1').focus();
    }
  }

  document.querySelectorAll('.pin-input').forEach((input, idx, inputs) => {
    input.addEventListener('input', function(e) {
      this.value = this.value.replace(/\D/g, '');
      if (this.value && idx < inputs.length - 1) {
        inputs[idx + 1].focus();
      }
      if (getPassword().length === 4) checkPassword();
    });

    input.addEventListener('keydown', function(e) {
      if (e.key === 'Backspace' && !this.value && idx > 0) {
        inputs[idx - 1].focus();
      }
    });
  });
</script>

</body>
</html>
